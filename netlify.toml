[build]
  command = "npm run build"
  publish = "dist/jaystechhub/browser"
  functions = "netlify/functions"

# Redirect /api/send-email to the Netlify serverless function
[[redirects]]
  from = "/api/send-email"
  to = "/.netlify/functions/send-email"
  status = 200

# SPA catch-all (must be LAST)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
