<!-- Desktop Navbar -->
<nav
  class="navbar"
  [class.scrolled]="scrolled"
  [class.dark-nav]="darkMode"
>
  <div class="nav-container">
    <!-- Logo -->
    <a class="nav-logo" (click)="routeToHome()" href="javascript:void(0)">
      <img [src]="fileLocation" alt="Jay's Tech Hub Logo" />
    </a>

    <!-- Desktop Links -->
    <ul class="nav-links">
        <li>
          <a
            (click)="scrollToSection('home')"
            [class.active]="activeSection === 'home'"
            href="javascript:void(0)"
          >Home</a>
        </li>
        <li>
          <a
            (click)="scrollToSection('about')"
            [class.active]="activeSection === 'about'"
            href="javascript:void(0)"
          >About</a>
        </li>
        <li>
          <a
            (click)="scrollToSection('services')"
            [class.active]="activeSection === 'services'"
            href="javascript:void(0)"
          >Services</a>
        </li>
        <li>
          <a
            (click)="scrollToSection('portfolio')"
            [class.active]="activeSection === 'portfolio'"
            href="javascript:void(0)"
          >Portfolio</a>
        </li>
        <li>
          <a
            (click)="scrollToSection('pricing')"
            [class.active]="activeSection === 'pricing'"
            href="javascript:void(0)"
          >Pricing</a>
        </li>
         <li>
          <a
            (click)="routeToFAQ()"
            [class.active]="!home"
            href="javascript:void(0)"
          >FAQ</a>
        </li>
       
    </ul>

    <!-- Desktop Actions -->
    <div class="nav-actions">
      <button
        class="theme-toggle"
        (click)="toggleDarkMode()"
        [attr.aria-label]="darkMode ? 'Switch to light mode' : 'Switch to dark mode'"
      >
        <i [class]="themeIcon"></i>
      </button>
      <a class="btn-primary nav-cta" (click)="scrollToSection('contact')" href="javascript:void(0)">
        Get a Quote
      </a>
    </div>

    <!-- Mobile Actions -->
    <div class="nav-mobile-actions">
      <button class="theme-toggle" (click)="toggleDarkMode()">
        <i [class]="themeIcon"></i>
      </button>
      <button
        class="hamburger"
        (click)="toggleMobileMenu()"
        [class.is-open]="mobileMenuOpen"
        aria-label="Toggle menu"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</nav>

<!-- Mobile Menu Overlay -->
<div
  class="mobile-overlay"
  [class.is-open]="mobileMenuOpen"
  (click)="closeMobileMenu()"
></div>

<!-- Mobile Drawer -->
<div class="mobile-drawer" [class.is-open]="mobileMenuOpen">
  <div class="drawer-header">
    <img [src]="fileLocation" alt="Jay's Tech Hub Logo" class="drawer-logo" />
    <button class="drawer-close" (click)="closeMobileMenu()">
      <i class="fa-solid fa-xmark"></i>
    </button>
  </div>

  <ul class="drawer-links">
   
      <li>
        <a (click)="scrollToSection('home')" [class.active]="activeSection === 'home'" href="javascript:void(0)">
          <i class="fa-solid fa-house"></i> Home
        </a>
      </li>
      <li>
        <a (click)="scrollToSection('about')" [class.active]="activeSection === 'about'" href="javascript:void(0)">
          <i class="fa-solid fa-building"></i> About
        </a>
      </li>
      <li>
        <a (click)="scrollToSection('services')" [class.active]="activeSection === 'services'" href="javascript:void(0)">
          <i class="fa-solid fa-gear"></i> Services
        </a>
      </li>
      <li>
        <a (click)="scrollToSection('portfolio')" [class.active]="activeSection === 'portfolio'" href="javascript:void(0)">
          <i class="fa-solid fa-briefcase"></i> Portfolio
        </a>
      </li>
      <li>
        <a (click)="scrollToSection('pricing')" [class.active]="activeSection === 'pricing'" href="javascript:void(0)">
          <i class="fa-solid fa-tag"></i> Pricing
        </a>
      </li>
      <li>
        <a (click)="routeToFAQ()" href="javascript:void(0)" [class.active]="!home">
          <i class="fa-solid fa-circle-question"></i> FAQ
        </a>
      </li>
   
  </ul>

  <div class="drawer-cta">
    <a class="btn-primary" style="width: 100%; justify-content: center;" (click)="scrollToSection('contact')" href="javascript:void(0)">
      <i class="fa-solid fa-paper-plane"></i> Get a Quote
    </a>
  </div>

  <div class="drawer-contact">
    <a href="tel:+2347041274446"><i class="fa-solid fa-phone"></i> (+234) 07041274446</a>
    <a href="mailto:jaystechub@gmail.com"><i class="fa-solid fa-envelope"></i> jaystechub&#64;gmail.com</a>
  </div>
</div>
